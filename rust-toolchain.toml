[toolchain]
# Pinned to the declared MSRV (see workspace.package.rust-version in
# Cargo.toml). Bumping this and the MSRV must travel together — the
# moment CI advertises one version while local builds float on
# another, contributors disagree about what compiles. Reason for the
# current pin: 1.85 covers the [workspace.lints] floor (Rust 1.74),
# is recent enough to use modern syntax, and is old enough that
# every distro's packaged Rust toolchain meets it.
channel    = "1.85.0"
components = ["rustfmt", "clippy"]
profile    = "minimal"
