[package]
name                 = "hpd-dbus"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
homepage.workspace   = true
description          = "zbus interface exposing the hpd daemon over the system bus (layer L4)."

[features]
default = []
# When enabled, every `set_*` method short-circuits the polkit
# authorization check and returns `true`. Activated transitively by the
# daemon's `simulator` feature because session-bus runs (macOS / dev
# hosts) have no polkit authority to talk to.
simulator = []

[dependencies]
hpd-core = { path = "../hpd-core" }
hpd-capabilities = { path = "../hpd-capabilities" }
zbus = "4.1"
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }
thiserror = { workspace = true }
