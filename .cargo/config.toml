# .cargo/config.toml
[target.'cfg(all())']
rustflags = [
    "-F", "unsafe_code",         # Forbid unsafe (except in hpd-netlink, which opts in with #[allow])
    "-W", "clippy::unwrap_used", # Warn on unwrap
    "-W", "clippy::expect_used", # Warn on expect
    "-W", "clippy::panic",       # Warn on panic
]