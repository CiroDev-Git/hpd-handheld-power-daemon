[workspace]
resolver = "2"
members = [
    # L-1 - Cross-cutting types (no internal deps)
    "crates/hpd-error",

    # L0 - Kernel I/O
    "crates/hpd-sysfs",
    "crates/hpd-netlink",

    # L2 - Capabilities (L2 before L1 because L1 depends on L2)
    "crates/hpd-capabilities",

    # L1 - Backends
    "crates/hpd-backend-asus",
    "crates/hpd-backend-lenovo",
    "crates/hpd-backend-valve",

    # L3 - Domain / Core
    "crates/hpd-core",

    # L4 - Interfaces & Daemon
    "crates/hpd-dbus",
    "crates/hpd-cli",
    "crates/hpd-daemon"
]

[workspace.dependencies]
# Error handling (rule: zero unwrap, explicit errors)
thiserror = "1.0"
tracing = "0.1"

# Async & I/O
tokio = { version = "1.36", features = ["full"] }
zbus = "4.1" # D-Bus and PPD integration

# Parsing & serialization
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"