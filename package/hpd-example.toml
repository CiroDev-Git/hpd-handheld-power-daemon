# /etc/hpd/config.toml — Handheld Power Daemon configuration
#
# Every field is optional. Missing fields fall back to the defaults shown
# below, so this file can be empty and the daemon will still work.
#
# Reloading: `systemctl reload hpd` (or `kill -HUP <pid>`) re-reads this
# file in-place. Fields marked "startup-only" require a daemon restart.

# -------- Daemon-only (startup-only fields) ----------------------------

# Where the daemon persists its in-memory state (TDP target, profile,
# charge limit, last DC envelope) so it can resurrect across reboots.
# Under systemd this is normally overridden by `StateDirectory=hpd`
# which sets STATE_DIRECTORY=/var/lib/hpd at runtime.
# state_path = "/var/lib/hpd/state.toml"

# Bound on the internal Transition mpsc channel. Sized for the bursty
# case of a user spamming the CLI while AC + suspend events also enqueue
# transitions. 32 has been more than enough in practice.
# channel_capacity = 32

# Initial charge-end-threshold used the very first time the daemon
# starts on a host where no state file exists yet and the backend can't
# report the current value. 80% is the long-battery-life sweet spot.
# default_charge_threshold = 80

# Fan-curve preset to program on first boot (no curve persisted yet).
# One of: silent, balanced, aggressive. The firmware's default curve is
# very conservative above ~62°C, so "balanced" runs noticeably cooler
# out of the box. Set to "" (empty) to leave the firmware curve alone.
# A curve you set later with `hpdctl cool set` is persisted and
# takes precedence over this on subsequent boots.
# default_fan_curve = "balanced"

# ACPI platform_profile (EPP / SMU power behaviour) programmed at every
# boot. Power and cooling are DECOUPLED: this is the power lever and it
# defaults to "performance" so the TDP / SPL you set is the real, usable
# limit (a "power-saver" profile would clamp the APU well below your SPL).
# Accepts: performance, balanced, power-saver (case-insensitive; the ACPI
# aliases quiet / low-power also map to power-saver). Set "balanced" or
# "power-saver" for an efficiency bias at the cost of peak performance.
# default_platform_profile = "performance"

# FIRST-BOOT SEED for the "lock to maximum performance on AC" preference.
# When true (the default), plugging in the charger pins Power mode →
# Performance, TDP → Max and cooling → Aggressive, and REJECTS every
# power/cooling change until you unplug; your battery (DC) preferences are
# restored on unplug. The battery charge threshold stays editable. When
# false, AC is fully manual (plugging in changes nothing).
#
# This is ONLY the first-boot default. After that the live value lives in
# state.toml and is toggled at runtime — no config edit / reload needed:
#   • CLI:    `hpdctl ac-lock on` / `hpdctl ac-lock off` / `hpdctl ac-lock`
#   • Plugin: the "Lock to max on AC" toggle in Settings
# default_ac_max_performance = true

# -------- Runtime-tunable (hot-reload via SIGHUP) ----------------------

# SPL→SPPT and SPL→FPPT multipliers used by "smart mode" (when the user
# only sets SPL, the daemon scales SPPT/FPPT above it). Both are then
# clamped to the hardware `*_max` rails reported by the backend.
# sppt_factor = 1.15
# fppt_factor = 1.25

# Auto-cooling inference: when `fan_follows_tdp` is on, the daemon maps
# SPL's position within the hardware range to a FAN CURVE preset (not the
# platform profile — power and cooling are decoupled). Below `low_frac` →
# silent, between → balanced, above `high_frac` → aggressive.
# [profile_thresholds]
# low_frac  = 0.33
# high_frac = 0.67
