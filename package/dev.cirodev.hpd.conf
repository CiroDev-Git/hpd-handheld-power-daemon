<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus policy for the Handheld Power Daemon.

  Coarse access control lives in polkit (see
  package/polkit/dev.cirodev.hpd.policy). At the bus level we only
  guarantee that:

  * Only root can claim the well-known bus name (= run the daemon).
  * Any user can send method calls to it; the daemon then performs a
    polkit CheckAuthorization() before honouring privileged operations.

  Property reads (`current_spl`, `active_profile`, `charge_end_threshold`,
  `is_ac_connected`) are unauthenticated by design — they are pure
  status read-outs with no side effects.

  hpd additionally claims `net.hadess.PowerProfiles` (best-effort, only
  if unowned) as a compatibility shim for `power-profiles-daemon` — see
  `hpd_dbus::ppd_shim`. That surface is intentionally as unauthenticated
  as hpd's own `active_profile`/`set_profile`-adjacent reads: real PPD
  clients (the KDE power applet, `powerprofilesctl`, CachyOS's
  `game-performance`) never expect a prompt, and gating them here would
  silently regress the exact thing the shim exists to fix.
-->
<busconfig>
  <policy user="root">
    <allow own="dev.cirodev.hpd.PowerDaemon1"/>
    <allow own="net.hadess.PowerProfiles"/>
  </policy>

  <policy context="default">
    <allow send_destination="dev.cirodev.hpd.PowerDaemon1"
           send_interface="dev.cirodev.hpd.PowerDaemon1"/>
    <allow send_destination="dev.cirodev.hpd.PowerDaemon1"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="dev.cirodev.hpd.PowerDaemon1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="net.hadess.PowerProfiles"
           send_interface="net.hadess.PowerProfiles"/>
    <allow send_destination="net.hadess.PowerProfiles"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="net.hadess.PowerProfiles"
           send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
