<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="dev.cirodev.hpd.PowerDaemon1"/>
    <allow send_destination="dev.cirodev.hpd.PowerDaemon1"/>
  </policy>

  <policy group="wheel">
    <allow send_destination="dev.cirodev.hpd.PowerDaemon1"/>
  </policy>

  <policy context="default">
    <deny send_destination="dev.cirodev.hpd.PowerDaemon1"/>
  </policy>
</busconfig>