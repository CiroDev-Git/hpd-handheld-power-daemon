name: AUR sync

# Fires when release.yml has published a GitHub Release. Skips
# pre-releases (RC/alpha/beta tags create Drafts that go nowhere
# downstream). Opt-in: does nothing useful without the AUR_SSH_KEY
# repository secret configured.
#
# Also exposes workflow_dispatch so a maintainer can:
#   • Smoke-test the AUR_SSH_KEY secret without publishing anything
#     (leave the `version` input empty).
#   • Re-push a specific version to AUR if a previous release-driven
#     run failed and was fixed (fill in `version` + pick which
#     package(s)).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to push (e.g. 1.0.0). Leave empty to only smoke-test the SSH credentials.'
        required: false
        type: string
      packages:
        description: 'Which AUR packages to push (ignored when version is empty)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - source
          - bin
          - none

# We only read the repository contents; the only write is to AUR
# over SSH, which is gated by the AUR_SSH_KEY secret.
permissions:
  contents: read

# If two releases publish back-to-back, queue (don't cancel) — both
# need to land in AUR in order.
concurrency:
  group: aur-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Render PKGBUILDs and push to AUR
    runs-on: ubuntu-latest
    # `archlinux:base-devel` gives us makepkg + pacman + bash. We
    # install only the small extras (openssh, git) on top.
    container:
      image: archlinux:base-devel
    steps:
      - name: Install dependencies (git, openssh, nodejs for actions/checkout)
        run: |
          pacman -Sy --noconfirm --needed git openssh sudo nodejs

      - uses: actions/checkout@v4

      - name: Skip pre-releases
        if: github.event_name == 'release' && github.event.release.prerelease
        run: |
          echo "::notice::Pre-release tag (${{ github.event.release.tag_name }}) — AUR sync is for stable releases only. Skipping."
          # Exit success so the workflow doesn't mark the release run
          # as failed.
          exit 0

      - name: Resolve version
        id: ver
        if: ${{ !(github.event_name == 'release' && github.event.release.prerelease) }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            version="${tag#v}"
            echo "Resolved tag=$tag → version=$version"
          else
            version="${{ inputs.version }}"
            if [ -z "$version" ]; then
              echo "::notice::Manual dispatch with empty version — pushes will be skipped, only the SSH smoke-test will run."
            else
              echo "Manual dispatch: version=$version"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configure SSH for AUR (opt-in)
        if: ${{ !(github.event_name == 'release' && github.event.release.prerelease) }}
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        id: ssh
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::notice::AUR sync skipped: no AUR_SSH_KEY repository secret configured. Configure it under Settings → Secrets → Actions to enable automatic AUR pushes."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p ~/.ssh
          # Write the key. The runner masks it in logs.
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          # Pin AUR's host key — fetched once, then trusted. If AUR
          # ever rotates, the workflow will fail loudly and a human
          # maintainer can refresh the known_hosts pin via PR.
          # stderr is the info/comment lines (# aur.archlinux.org...);
          # stdout is the actual key. Suppress info but keep errors visible.
          if ! ssh-keyscan -t ed25519,rsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null \
              || [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan aur.archlinux.org failed or returned empty output. Check network access from the runner."
            exit 1
          fi
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
              User aur
              IdentityFile ~/.ssh/aur
              StrictHostKeyChecking yes
              IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config
          # makepkg in base-devel refuses to run as root. Set up a
          # builder user with sudo.
          useradd --create-home --shell /bin/bash builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          # Copy ssh + repo to builder so makepkg's UID has access.
          cp -r ~/.ssh /home/builder/.ssh
          chown -R builder:builder /home/builder/.ssh
          chmod 700 /home/builder/.ssh
          chmod 600 /home/builder/.ssh/aur
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Smoke-test SSH connection to AUR
        if: steps.ssh.outputs.configured == 'true'
        shell: bash
        run: |
          set -uo pipefail

          # Pre-flight: confirm the SSH state the previous step left
          # behind. None of this leaks secrets — the private key is
          # never read, only listed; config and known_hosts contain
          # only the AUR host alias and AUR's public host key.
          echo "--- ssh setup state ---"
          echo "user:  $(whoami) ($(id))"
          echo "HOME:  ${HOME:-<unset>}"
          echo "ls -la ~/.ssh/:"
          ls -la ~/.ssh/ 2>&1 | sed 's/^/  /' || echo "  (cannot list — directory missing or unreadable)"
          if [ -r ~/.ssh/config ]; then
            echo "~/.ssh/config:"
            sed 's/^/  /' ~/.ssh/config
          else
            echo "::warning::~/.ssh/config is missing or unreadable — the previous Configure SSH step did not leave it behind."
          fi
          if [ -s ~/.ssh/known_hosts ]; then
            echo "~/.ssh/known_hosts: $(wc -l < ~/.ssh/known_hosts) entr(y/ies)"
          else
            echo "::warning::~/.ssh/known_hosts is missing or empty — ssh-keyscan output did not land where expected."
          fi
          echo ""

          # Print the fingerprint of the key the runner is about to
          # offer. Fingerprints are safe to log (they don't expose
          # private material) and let the operator compare against
          # what's registered at https://aur.archlinux.org/account/ →
          # SSH Keys.
          echo "Offering key fingerprint:"
          if ! ssh-keygen -lf ~/.ssh/aur; then
            echo "::error::Cannot parse ~/.ssh/aur as a valid OpenSSH private key."
            echo "::error::The AUR_SSH_KEY secret is most likely corrupted (missing newlines, partial paste, or wrong format)."
            echo "::error::Re-set it with: gh secret set AUR_SSH_KEY < ~/.ssh/aur_hpd --repo <owner>/<repo>"
            exit 1
          fi
          echo ""

          # Run ssh with verbose output but capture stderr so the log
          # only appears if auth fails. -v shows key offerings, server
          # banner, and auth attempts — no private material. Pass -F
          # and -i explicitly: relying on ssh's auto-discovery of
          # ~/.ssh/config has bitten us once already (the file was
          # silently being skipped despite existing on disk).
          # `ssh aur@aur.archlinux.org help` exits 0 on success and 255
          # on publickey rejection.
          log="$(mktemp)"
          if ssh -v \
                 -F ~/.ssh/config \
                 -i ~/.ssh/aur \
                 -o BatchMode=yes \
                 -o ConnectTimeout=15 \
                 aur@aur.archlinux.org help > /dev/null 2>"$log"; then
              echo "SSH connection to AUR: OK"
              exit 0
          fi

          echo "::error::SSH authentication to aur@aur.archlinux.org failed."
          echo "::error::Compare the fingerprint above to https://aur.archlinux.org/account/ → SSH Keys."
          echo "::error::If they don't match, re-register the .pub matching the AUR_SSH_KEY secret."
          echo "::error::If they DO match, the secret may be corrupted — re-upload with: gh secret set AUR_SSH_KEY < ~/.ssh/aur_hpd"
          echo ""
          echo "--- ssh -v output ---"
          cat "$log"
          exit 1

      - name: Push source package to AUR
        if: |
          steps.ssh.outputs.configured == 'true'
          && steps.ver.outputs.version != ''
          && (github.event_name == 'release' || inputs.packages == 'both' || inputs.packages == 'source')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          chmod +x scripts/aur-sync.sh
          # makepkg refuses root; run as builder, but pass the repo
          # checkout to it explicitly. Copy script + templates to the
          # builder's home so it can read them.
          cp -r . /home/builder/repo
          chown -R builder:builder /home/builder/repo
          sudo -u builder -H bash -c "cd /home/builder/repo && ./scripts/aur-sync.sh hpd-handheld-power-daemon \"$VERSION\""

      - name: Push binary package to AUR
        if: |
          steps.ssh.outputs.configured == 'true'
          && steps.ver.outputs.version != ''
          && (github.event_name == 'release' || inputs.packages == 'both' || inputs.packages == 'bin')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          chmod +x scripts/aur-sync.sh
          # The release tarball must exist in the GitHub Release for
          # the bin package's sha256 computation to succeed. Releases
          # publish the tarball as part of release.yml's `gh release
          # create` step, so by the time we get here the asset is
          # already up. (On manual dispatch the tarball must already
          # exist at releases/download/v$VERSION/ — otherwise the
          # script's curl|sha256sum step fails fast.)
          sudo -u builder -H bash -c "cd /home/builder/repo && ./scripts/aur-sync.sh hpd-handheld-power-daemon-bin \"$VERSION\""
