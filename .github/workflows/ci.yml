name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same ref —
# saves CI minutes during rebase-heavy PR cycles.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Primary job: fmt + clippy + tests + doc + release build on Linux,
  # with the default feature set. All steps must pass for the workspace
  # to be considered green.
  build-test:
    name: Linux (fmt, clippy, test, doc, release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (libudev)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo doc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: cargo build --release
        run: cargo build --workspace --release

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: hpd-linux-x86_64
          path: |
            target/release/hpd-daemon
            target/release/hpdctl
          if-no-files-found: error
          retention-days: 30

  # Secondary job: the simulator build is what macOS / dev hosts use.
  # Verifying it compiles on macOS prevents accidental Linux-only
  # changes leaking into the simulator path.
  build-macos-simulator:
    name: macOS simulator build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo build (daemon + cli, simulator features)
        run: cargo build -p hpd-daemon -p hpd-cli --features hpd-daemon/simulator

  # Feature matrix: verifies every documented build combination compiles
  # warning-free. Catches the class of bug Lote 29 fixed (modules left
  # reachable only behind a vendor cfg producing dead-code warnings on
  # non-default builds) and any future drift.
  feature-matrix:
    name: Feature matrix (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "no-default-features"
            flags: "--no-default-features"
          - label: "vendor-asus (explicit)"
            flags: "--no-default-features --features vendor-asus"
          - label: "simulator"
            flags: "--no-default-features --features simulator"
          - label: "all-features"
            flags: "--all-features"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install system dependencies (libudev)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo build -p hpd-daemon ${{ matrix.flags }}
        env:
          RUSTFLAGS: -D warnings
        run: cargo build -p hpd-daemon ${{ matrix.flags }}

  # Supply-chain checks: known-vulnerable deps (cargo-audit against the
  # RustSec advisory DB) + license / banned-crate / duplicate-version
  # policy (cargo-deny against deny.toml at repo root).
  #
  # Uses `stable` (not the pinned MSRV) because cargo-audit and its own
  # transitive deps track the current Rust release. MSRV is enforced by
  # the build-test and feature-matrix jobs above.
  #
  # RUSTUP_TOOLCHAIN=stable at the job level overrides rust-toolchain.toml
  # (which pins 1.85.0 for the project itself) so that cargo install
  # cargo-audit uses the current stable compiler.
  supply-chain:
    name: Supply chain (audit + deny)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache the compiled cargo-audit binary across runs. Keyed on the
      # runner OS + stable toolchain date so it refreshes when stable bumps.
      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ steps.toolchain.outputs.cachekey }}

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit

      # Run scoped to Linux targets only: advisories marked `os = ["windows"]`
      # (e.g. RUSTSEC-2024-0019 / mio named-pipes) are not relevant to this
      # Linux-only daemon and are filtered out by --target. The deny.toml
      # [graph] section already excludes Windows for the same reason.
      - name: cargo audit
        run: cargo audit --target-os linux

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v1
